networks:
  observability:
    driver: bridge

services:
  petclinic:
    build:
      context: ./petclinic
    container_name: petclinic
    ports:
      - "8080:8080"
    environment:
      - OTEL_SERVICE_NAME=petclinic
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4318
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
    networks:
      - observability

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    ports:
      - "12345:12345" 
      - "4317:4317"   
      - "4318:4318"   
    volumes:
      - ./alloy/config.river:/etc/alloy/config.river
    command: [ "run", "--server.http.listen-addr=0.0.0.0:12345", "/etc/alloy/config.river" ]
    networks:
      - observability

  mimir:
    image: grafana/mimir:latest
    container_name: mimir
    command: [ "-config.file=/etc/mimir/mimir.yaml" ]
    volumes:
      - ./mimir:/etc/mimir
      # PERSISTENCE: Mimir stores metrics in /data
      - mimir-data:/data
    networks:
      - observability

  loki:
    image: grafana/loki:latest
    container_name: loki
    command: [ "-config.file=/etc/loki/local-config.yaml" ]
    volumes:
      # PERSISTENCE: Loki default local-config stores chunks in /tmp/loki
      - loki-data:/tmp/loki
    networks:
      - observability

  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    command: [ "-config.file=/etc/tempo/tempo.yaml" ]
    environment:
      - TEMPO_RECEIVER_OTLP_PROTOCOLS_GRPC_ENDPOINT=0.0.0.0:4317
    volumes:
      - ./tempo:/etc/tempo
      # PERSISTENCE: Tempo stores traces in /var/tempo
      - tempo-data:/var/tempo
    networks:
      - observability

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/provisioning/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      # PERSISTENCE: Grafana stores your dashboards and SQLite DB here
      - grafana-data:/var/lib/grafana
    networks:
      - observability

  artillery:
    image: artilleryio/artillery:latest
    container_name: artillery
    volumes:
     - ./traffic/load-test.yml:/load-test.yml
    command: [ "run", "/load-test.yml" ]
    depends_on:
      - petclinic
    networks:
      - observability

# ---------------------------------------------------------
# THIS IS THE MAGIC: Declaring the persistent named volumes
# ---------------------------------------------------------
volumes:
  grafana-data:
  mimir-data:
  loki-data:
  tempo-data:
